# Categories of commands that bash-approve will auto-approve.
# Use coarse groups (git, python, rust, ...) or fine-grained names (git read op, git write op, ...).
# The special group "all" enables everything not in "disabled".
# "disabled" overrides "enabled" — use this to carve out exceptions.
#
# When this file is absent or has no enabled/disabled keys, all commands are approved.
#
# Some commands default to "ask" (fall through to Claude Code's permission prompt):
#   git push, git tag, gh pr create, go mod init
# To auto-approve them, add them to "enabled" explicitly.
#
# Some commands default to "deny" (blocked):
#   git stash, git revert, git reset --hard, git checkout ., git clean -f
#   git config core.worktree, go mod vendor, roborev tui
#
# Available coarse groups:
#   wrapper, git, python, node, rust, make, nix, shell, gh, go, kubectl, bq, acli, roborev, ruby,
#   shellcheck, grpcurl, git-spice, kata, tmux
#
# Fine-grained names within each group:
#   wrapper:  timeout, time, nice, env, env vars, .venv, bundle exec, rtk proxy, command, node_modules/.bin
#   git:      git read op, git write op, git push (ask), git tag (ask), git destructive
#             git stash (deny), git revert (deny), git reset --hard (deny),
#             git checkout . (deny), git clean -f (deny),
#             git config core.worktree (deny)
#   python:   pytest, python, ruff, uv, uvx
#   node:     npm, npm audit fix (ask), npx, vitest, bun, bunx
#   rust:     cargo, maturin
#   make:     make
#   nix:      nix, nix flake read, nix-build, nix-shell, nix-store query, nh build
#             (`nix run` and `nix shell` --command delegate to the inner command's tags)
#   shell:    read-only, touch, shell builtin, process mgmt, echo, cd, venv activate, sleep, var assignment, lookup
#   gh:       gh read op, gh pr create, gh write op, gh api, gh auth
#   go:       go, go mod vendor (deny), go mod init (ask), golangci-lint, ginkgo, nilaway
#   kubectl:  kubectl read op, kubectl write op, kubectl port-forward, kubectl exec, kubectl cp
#   bq:       bq
#   acli:     acli
#   roborev:  roborev, roborev show, roborev read op, roborev tui (deny)
#   ruby:     rspec, rake, ruby, rails, bundle, gem, rubocop, solargraph, standardrb
#   tmux:     tmux
#
# Example: disable all git write operations:
# disabled:
#   - git write op
